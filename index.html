<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Olumide - Fullstack Developer | High-Performance Web Applications</title>
    <meta name="description" content="Fullstack developer specializing in high-performance web applications. I build scalable digital products with clean code and intuitive user experiences using React, Node.js, and modern technologies." />

    <meta name="author" content="Olumide" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://your-portfolio-domain.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-portfolio-domain.com" />
    <meta property="og:title" content="Olumide - Fullstack Developer | High-Performance Web Applications" />
    <meta property="og:description" content="Fullstack developer specializing in high-performance web applications. I build scalable digital products with clean code and intuitive user experiences." />
    <meta property="og:image" content="https://your-portfolio-domain.com/og-image.jpg" />
    <meta property="og:site_name" content="Olumide Portfolio" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-portfolio-domain.com" />
    <meta property="twitter:title" content="Olumide - Fullstack Developer | High-Performance Web Applications" />
    <meta property="twitter:description" content="Fullstack developer specializing in high-performance web applications. I build scalable digital products with clean code and intuitive user experiences." />
    <meta property="twitter:image" content="https://your-portfolio-domain.com/twitter-image.jpg" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#020617" />
    <meta name="msapplication-TileColor" content="#020617" />

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Olumide",
      "jobTitle": "Fullstack Developer",

        "https://github.com/yourusername",
        "https://linkedin.com/in/yourprofile",

      ],
      "knowsAbout": [
        "JavaScript",
        "React",
        "Node.js",
        "MongoDB",
        "Express.js",
        "Web Development",
        "Fullstack Development"
      ],
      "hasOccupation": {
        "@type": "Occupation",
        "name": "Fullstack Developer",
        "occupationLocation": {
          "@type": "Country",
          "name": "Nigeria"
        }
      }
    }
    </script>
  </head>
